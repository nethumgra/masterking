<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Pink Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        'mudalali-green': {
                            light: '#fbcfe8',
                            DEFAULT: '#db2777', // Modern Pinkish-Red
                            dark: '#be185d',
                            900: '#831843'
                        },
                        'mm-gray': { 50: '#f9fafb', 100: '#f3f4f6', 200: '#e5e7eb', 500: '#6b7280', 800: '#1f2937' }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-sans text-gray-800 bg-white selection:bg-mudalali-green selection:text-white; }
        }
        @layer components {
            .drawer-overlay { @apply fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] transition-opacity duration-300 opacity-0 pointer-events-none; }
            .drawer-content { @apply fixed top-0 right-0 h-full bg-white shadow-2xl z-[101] transform translate-x-full transition-transform duration-500 ease-in-out w-[90%] max-w-[450px]; }
            .drawer.open .drawer-overlay { @apply opacity-100 pointer-events-auto; }
            .drawer.open .drawer-content { @apply transform translate-x-0; }
            
            .btn-primary { @apply bg-mudalali-green text-white py-4 px-8 rounded-2xl font-bold shadow-lg hover:bg-mudalali-green-dark transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-50; }
            .btn-secondary { @apply bg-white border-2 border-mudalali-green text-mudalali-green py-4 px-8 rounded-2xl font-bold hover:bg-pink-50 transition-all active:scale-95 flex items-center justify-center gap-2; }
            
            .variation-btn { @apply px-5 py-2.5 border-2 border-gray-100 rounded-xl text-sm font-bold transition-all duration-200 hover:border-pink-200 bg-white text-gray-600 cursor-pointer; }
            .variation-btn.active { @apply border-mudalali-green bg-pink-50 text-mudalali-green ring-1 ring-mudalali-green shadow-sm; }
            
            .page-tab-btn { @apply flex-1 text-center py-4 font-bold text-gray-400 border-b-4 border-transparent transition-all cursor-pointer; }
            .page-tab-btn.active { @apply text-mudalali-green border-mudalali-green bg-pink-50/30; }

            .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #f7f7f7 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
            @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
            
            .rating-stars .star { @apply text-gray-300 cursor-pointer text-2xl transition-colors; }
            .rating-stars .star.selected { @apply text-yellow-400; }
        }

        /* Gallery */
        #main-product-image { transition: opacity 0.15s ease; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        #lightbox { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    </style>
</head>
<body class="pb-20 md:pb-0">

  <main class="container mx-auto px-4 py-8">

            <div class="lg:col-span-2 space-y-10">

    <div id="cart-drawer" class="drawer">

    <script type="module">
                // ── Firebase shared config (no more duplicates!) ──
        import { db, auth, sanitize } from "./firebase-config.js";
        import { doc, getDoc, getDocs, collection, onSnapshot, query, where, orderBy, limit, setDoc, deleteDoc, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let currentUser = null;
        let productData = null;
        let selectedVars = {};
        let selectedVariationPrices = {};
        let quantity = 1;

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        // --- CORE FUNCTIONS ---
async function initProductPage() {
    if (!productId) return window.location.href = 'shop.html';

    try {
        const docSnap = await getDoc(doc(db, '/artifacts/default-app-id/public/data/products', productId));
        if (!docSnap.exists()) return window.location.href = 'shop.html';

        productData = { id: docSnap.id, ...docSnap.data() };
        
        renderProductUI();
        loadSellerData(productData.sellerUid);
        loadRelatedProducts();
        loadReviews();

        // Error Fix: Skeleton එක අයින් කරලා Content එක පෙන්වීම
        document.getElementById('product-skeleton')?.classList.add('hidden');
        document.getElementById('product-content')?.classList.remove('hidden');

        // Share Button එකට Click Event එක ලබා දීම
        const shareBtn = document.getElementById('share-btn');
        if (shareBtn) shareBtn.onclick = handleShare;

    } catch (e) { 
        console.error("Initialization Error:", e); 
    }
}

async function handleShare() {
    if (!productData) return; // දත්ත නැතිනම් වැඩ නොකරන්න

    const shareData = {
        title: productData.name,
        text: `Check out this ${productData.name} on Pink Store!`,
        url: window.location.href,
    };

    try {
        if (navigator.share) {
            // Mobile devices වලදී
            await navigator.share(shareData);
        } else {
            // Desktop වලදී (Copy to Clipboard)
            await navigator.clipboard.writeText(window.location.href);
            alert("Link copied to clipboard!");
        }
    } catch (err) {
        console.error("Share failed:", err);
    }
}

 function renderProductUI() {
        const nameEl = document.getElementById('product-name');
        const imgEl = document.getElementById('main-product-image');
        const descEl = document.getElementById('product-description');
        const delEl = document.getElementById('product-delivery');

        if(nameEl) nameEl.textContent = productData.name;
        // ── IMAGE GALLERY ──────────────────────────────────────
        const images = (productData.images && productData.images.length > 0)
            ? productData.images
            : [productData.imageUrl || 'https://placehold.co/600'];

        window._galleryImages  = images;
        window._galleryIndex   = 0;

        // Set first image
        if (imgEl) imgEl.src = images[0];

        const strip   = document.getElementById('thumbnail-strip');
        const counter = document.getElementById('gallery-counter');
        const prevBtn = document.getElementById('gallery-prev');
        const nextBtn = document.getElementById('gallery-next');

        function setGalleryImage(idx) {
            window._galleryIndex = idx;
            if (imgEl) {
                imgEl.style.opacity = '0';
                setTimeout(() => {
                    imgEl.src = images[idx];
                    imgEl.style.opacity = '1';
                }, 150);
            }
            // Update thumbnails active state
            strip?.querySelectorAll('.thumb-btn').forEach((t, i) => {
                t.classList.toggle('ring-2',    i === idx);
                t.classList.toggle('ring-mudalali-green', i === idx);
                t.classList.toggle('opacity-50', i !== idx);
            });
            if (counter) counter.textContent = (idx + 1) + ' / ' + images.length;
        }

        // Build thumbnails
        if (images.length > 1 && strip) {
            strip.classList.remove('hidden');
            strip.innerHTML = images.map((url, i) => `
                <button class="thumb-btn flex-shrink-0 w-16 h-16 rounded-xl overflow-hidden border-2 border-transparent transition-all ${i===0?'ring-2 ring-mudalali-green':'opacity-50'}"
                    onclick="setGalleryImage(${i})" style="outline:none">
                    <img src="${url}" class="w-full h-full object-cover" loading="lazy"
                        onerror="this.src='https://placehold.co/64'">
                </button>`).join('');

            // Show arrows + counter
            if (prevBtn) prevBtn.classList.remove('hidden');
            if (nextBtn) nextBtn.classList.remove('hidden');
            if (counter) { counter.classList.remove('hidden'); counter.textContent = '1 / ' + images.length; }
        }

        // Expose functions to window for inline onclick
        window.setGalleryImage = setGalleryImage;
        window.galleryNav = function(dir) {
            const next = (window._galleryIndex + dir + images.length) % images.length;
            setGalleryImage(next);
        };
        window.openLightbox = function(src) {
            const lb    = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            const lbCounter = document.getElementById('lightbox-counter');
            if (lb && lbImg) {
                lbImg.src = src;
                lb.classList.remove('hidden');
                lb.classList.add('flex');
                document.body.style.overflow = 'hidden';
                if (lbCounter && window._galleryImages) {
                    lbCounter.textContent = (window._galleryIndex + 1) + ' / ' + window._galleryImages.length;
                }
            }
        };
        window.closeLightbox = function() {
            const lb = document.getElementById('lightbox');
            if (lb) { lb.classList.add('hidden'); lb.classList.remove('flex'); document.body.style.overflow = ''; }
        };

        // Keyboard navigation for lightbox
        document.addEventListener('keydown', function(e) {
            const lb = document.getElementById('lightbox');
            if (!lb || lb.classList.contains('hidden')) return;
            if (e.key === 'Escape')      { closeLightbox(); }
            else if (e.key === 'ArrowLeft')  {
                galleryNav(-1);
                const lbImg = document.getElementById('lightbox-img');
                const lbCounter = document.getElementById('lightbox-counter');
                if (lbImg) lbImg.src = window._galleryImages[window._galleryIndex];
                if (lbCounter) lbCounter.textContent = (window._galleryIndex+1)+' / '+window._galleryImages.length;
            }
            else if (e.key === 'ArrowRight') {
                galleryNav(1);
                const lbImg = document.getElementById('lightbox-img');
                const lbCounter = document.getElementById('lightbox-counter');
                if (lbImg) lbImg.src = window._galleryImages[window._galleryIndex];
                if (lbCounter) lbCounter.textContent = (window._galleryIndex+1)+' / '+window._galleryImages.length;
            }
        });
        // ── END GALLERY ─────────────────────────────────────
        if(descEl) descEl.innerHTML = productData.description?.replace(/\n/g, '<br>') || 'No description available.';
        if(delEl) delEl.innerHTML = productData.deliveryDetails || 'Estimated delivery: 3-5 working days.';

        const varBox = document.getElementById('product-variations');
        if(!varBox) return;
        varBox.innerHTML = ''; 
        
        let variations = productData.variations || [];
        if (!Array.isArray(variations)) variations = Object.values(variations);

        selectedVariationPrices = {}; 

        variations.forEach((vGroup) => {
            if (!vGroup.name || !vGroup.options) return;

            const div = document.createElement('div');
            div.className = "mb-6";
            div.innerHTML = `<label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-3">${vGroup.name}</label>`;
            
            const groupWrapper = document.createElement('div');
            groupWrapper.className = 'flex flex-wrap gap-3';
            
            const options = Array.isArray(vGroup.options) ? vGroup.options : Object.values(vGroup.options);

          options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = `variation-btn ${i === 0 ? 'active' : ''}`;
    
    let optName, optPrice;
    if (typeof opt === 'object' && opt !== null) {
        optName = opt.name || opt.label;
        // මෙතැනදී 'price' වෙනුවට 'marketPrice' භාවිතා කරන්න
        optPrice = parseFloat(opt.marketPrice) || 0; 
    } else {
        optName = opt;
        optPrice = 0;
    }

                btn.textContent = optName;
                
                if (i === 0) {
                    selectedVars[vGroup.name] = optName;
                    selectedVariationPrices[vGroup.name] = optPrice;
                }

                btn.onclick = () => {
                    groupWrapper.querySelectorAll('.variation-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedVars[vGroup.name] = optName;
                    selectedVariationPrices[vGroup.name] = optPrice;
                    calculateFinalPrice();
                };
                groupWrapper.appendChild(btn);
            });
            
            div.appendChild(groupWrapper);
            varBox.appendChild(div);
        });

        calculateFinalPrice();
    }

   function calculateFinalPrice() {
    // භාණ්ඩයේ මූලික මිල
    let basePrice = parseFloat(productData.price) || 0;
    
    // Variation වල මුළු අගය (ඔයාට මේක 'එකතු වෙන්න' ඕනෙද නැද්ද යන්න තීරණය කරන්න පුළුවන්)
    let extraPrice = Object.values(selectedVariationPrices).reduce((a, b) => a + b, 0);

    // --- විසඳුම ---
    // මචං, ඔයාට Variation එකේ මිල විතරක් පෙන්වන්න ඕනේ නම් (Base price එකතු කරන්නේ නැතුව)
    // මේ logic එක පාවිච්චි කරන්න:
    let finalTotal = extraPrice > 0 ? extraPrice : basePrice;

    // නමුත් ඔයාට Base Price එකට මේක එකතු වෙන්නම ඕනේ නම් පරණ විදිහ තියන්න:
    // let finalTotal = basePrice + extraPrice; 

    const priceContainer = document.getElementById('product-price-container');
    if (priceContainer) {
        priceContainer.innerHTML = `<span class="text-4xl font-black text-mudalali-green">Rs. ${finalTotal.toLocaleString()}</span>`;
    }
}

// මිල පෙන්වන ලස්සන Helper Function එකක්

    if (priceContainer) {
        priceContainer.innerHTML = `<span class="text-4xl font-black text-mudalali-green">Rs. ${amount.toLocaleString()}</span>`;
    }
}

     async function loadRelatedProducts() {
    const grid = document.getElementById('related-products-grid');
    if (!grid) return;

    // Skeleton placeholders
    grid.innerHTML = Array(6).fill(0).map(() => `
        <div class="rounded-xl overflow-hidden bg-gray-50 animate-pulse">
            <div class="h-36 bg-pink-100"></div>
            <div class="p-2 space-y-1.5">
                <div class="h-2.5 bg-pink-100 rounded w-3/4"></div>
                <div class="h-3 bg-pink-100 rounded w-1/2"></div>
            </div>
        </div>`).join('');

    try {
        const q = query(collection(db, '/artifacts/default-app-id/public/data/products'), orderBy('createdAt', 'desc'), limit(13));
        const snap = await getDocs(q);

        grid.innerHTML = '';

        if (snap.empty) {
            grid.innerHTML = '<p class="col-span-2 text-[10px] text-gray-400 italic text-center py-4">No products found.</p>';
            return;
        }

        snap.forEach(d => {
            if (d.id === productId) return;
            const p = d.data();

            const img  = (p.images && p.images.length > 0) ? p.images[0] : (p.imageUrl || 'https://placehold.co/400x400');
            const img2 = (p.images && p.images.length > 1) ? p.images[1] : img;
            const price = parseFloat(p.price) || 0;
            const badge = p.saleTag
                ? `<span class="absolute top-2 left-2 bg-red-500 text-white text-[9px] font-black px-2 py-0.5 rounded-full shadow">${p.saleTag}</span>`
                : `<span class="absolute top-2 left-2 bg-mudalali-green text-white text-[9px] font-black px-2 py-0.5 rounded-full shadow">NEW</span>`;

            const card = document.createElement('a');
            card.href = `product.html?id=${d.id}`;
            card.className = 'group block rounded-xl overflow-hidden bg-white border border-gray-100 hover:border-pink-200 hover:shadow-md transition-all duration-300';
            card.innerHTML = `
                <div class="relative h-36 overflow-hidden bg-gray-50">
                    <img src="${img}" alt="${p.name}"
                        class="absolute inset-0 w-full h-full object-cover transition-all duration-500 group-hover:scale-105"
                        loading="lazy" onerror="this.src='https://placehold.co/200x200'">
                    ${p.images && p.images.length > 1 ? `
                    <img src="${img2}" alt="${p.name}"
                        class="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-100 transition-opacity duration-500"
                        loading="lazy">` : ''}
                    ${badge}
                </div>
                <div class="p-2.5">
                    <h4 class="text-[11px] font-bold text-gray-800 line-clamp-2 leading-tight group-hover:text-mudalali-green transition-colors mb-1">${p.name}</h4>
                    <p class="text-[12px] font-black text-mudalali-green">Rs. ${price.toLocaleString()}</p>
                </div>`;
            grid.appendChild(card);
        });
    } catch (e) {
        console.error("Related Products Error:", e);
        grid.innerHTML = '<p class="col-span-2 text-[10px] text-red-400 italic text-center py-4">Could not load products.</p>';
    }
}

        function loadReviews() {
            const list = document.getElementById('reviews-list');
            const q = query(collection(db, '/artifacts/default-app-id/public/data/productReviews'), 
                        where('productId', '==', productId), orderBy('createdAt', 'desc'));
            
            onSnapshot(q, snap => {
                if (snap.empty) {

 // product.html ඇතුළේ addToCart function එක මෙහෙම වෙනස් කරන්න
async function addToCart(buyNow = false) {
    if (!currentUser) {
        openLoginModal(buyNow);
        return;
    }
    
    const btn = buyNow ? document.getElementById('buy-now-btn') : document.getElementById('add-to-cart-btn');
    btn.disabled = true;

    // --- මිල ගණනය කිරීම ---
    let basePrice = parseFloat(productData.price) || 0;
    let extraPrice = Object.values(selectedVariationPrices).reduce((a, b) => a + b, 0);
    
    // Variation එකේ මිලක් තිබේ නම් එය ගනී, නැත්නම් base price ගනී
    let finalPriceToSave = extraPrice > 0 ? extraPrice : basePrice;

    const varSuffix = Object.values(selectedVars).join('').replace(/\s/g, '');
    const cartId = productId + varSuffix;
    
    try {
        const cartData = {
            productId: productId,
            name: productData.name,
            price: finalPriceToSave, // <--- මෙතනට දැන් නිවැරදි මිල ලැබෙනවා
            imageUrl: productData.images?.[0] || productData.imageUrl,
            quantity: increment(quantity), 
            variations: selectedVars,
            sellerUid: productData.sellerUid || '', // Order එක බෙදා වෙන් කරගන්න මේක වැදගත්
            addedAt: serverTimestamp()
        };

        await setDoc(doc(db, 'users', currentUser.uid, 'cart', cartId), cartData, { merge: true });
        
        if (buyNow) {
            window.location.href = 'checkout.html';
        } else {
            document.getElementById('cart-drawer').classList.add('open');
        }
    } catch (e) {
        console.error("Cart Error:", e);
    } finally {
        btn.disabled = false;
    }
}
        // --- UI HELPERS ---

        // ── LOGIN MODAL ──────────────────────────────────
        let _pendingBuyNow = false;

        window.openLoginModal = (buyNow = false) => {
            _pendingBuyNow = buyNow;
            const modal = document.getElementById('login-modal');
            const box   = document.getElementById('login-modal-box');
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                box.classList.remove('scale-95','opacity-0');
                box.classList.add('scale-100','opacity-100');
            });
            document.getElementById('modal-login-email').focus();
        };

        window.closeLoginModal = () => {
            const modal = document.getElementById('login-modal');
            const box   = document.getElementById('login-modal-box');
            box.classList.remove('scale-100','opacity-100');
            box.classList.add('scale-95','opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 250);
            document.getElementById('modal-login-error').textContent = '';
        };

        window.toggleModalPw = () => {
            const inp = document.getElementById('modal-login-password');
            const eye = document.getElementById('modal-pw-eye');
            const show = inp.type === 'password';
            inp.type = show ? 'text' : 'password';
            eye.className = show ? 'fa fa-eye-slash text-sm' : 'fa fa-eye text-sm';
        };

        window.submitModalLogin = async () => {
            const email    = document.getElementById('modal-login-email').value.trim();
            const password = document.getElementById('modal-login-password').value;
            const errEl    = document.getElementById('modal-login-error');
            const btn      = document.getElementById('modal-login-btn');

            if (!email || !password) { errEl.textContent = 'Please fill all fields.'; return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Logging in...';
            errEl.textContent = '';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // onAuthStateChanged will set currentUser — wait a tick then proceed
                closeLoginModal();
                setTimeout(() => addToCart(_pendingBuyNow), 400);
            } catch (e) {
                const msg = e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password'
                    ? 'Incorrect email or password.'
                    : e.code === 'auth/user-not-found'
                    ? 'No account found with this email.'
                    : e.code === 'auth/too-many-requests'
                    ? 'Too many attempts. Try later.'
                    : 'Login failed. Please try again.';
                errEl.textContent = msg;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-sign-in-alt"></i> Login';
            }
        };

        // Close modal on backdrop click
        document.getElementById('login-modal').addEventListener('click', function(e) {
            if (e.target === this) closeLoginModal();
        });

        // Enter key submits
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !document.getElementById('login-modal').classList.contains('hidden')) {
                submitModalLogin();
            }
        });
        // ── END LOGIN MODAL ──────────────────────────────

        function updateProgress(v) { 
            const bar = document.getElementById('page-loader');
            bar.style.width = v + '%'; 
            if(v === 100) setTimeout(() => bar.style.opacity = '0', 500); 
        }

        // Global Remove Function
        window.removeFromCart = async (id) => {
            if(!currentUser) return;
            await deleteDoc(doc(db, 'users', currentUser.uid, 'cart', id));
        };

        // --- EVENT LISTENERS ---

        document.getElementById('qty-plus').onclick = () => { if(quantity < 10) quantity++; document.getElementById('qty-input').value = quantity; };
        document.getElementById('qty-minus').onclick = () => { if(quantity > 1) quantity--; document.getElementById('qty-input').value = quantity; };
        document.getElementById('add-to-cart-btn').onclick = () => addToCart(false);
        document.getElementById('buy-now-btn').onclick = () => addToCart(true);
        document.getElementById('cart-drawer-btn').onclick = () => document.getElementById('cart-drawer').classList.add('open');
        document.getElementById('close-cart').onclick = () => document.getElementById('cart-drawer').classList.remove('open');
        document.getElementById('cart-overlay').onclick = () => document.getElementById('cart-drawer').classList.remove('open');

        // Tab Switching
        ['desc', 'delivery', 'reviews'].forEach(t => {
            document.getElementById(`${t}-tab-btn`).onclick = () => {
                ['desc', 'delivery', 'reviews'].forEach(x => {
                    document.getElementById(`${x}-tab-btn`).classList.remove('active');
                    document.getElementById(`${x}-tab-panel`).classList.add('hidden');
                });
                document.getElementById(`${t}-tab-btn`).classList.add('active');
                document.getElementById(`${t}-tab-panel`).classList.remove('hidden');
            };
        });

        // Review Form Star Logic
        const stars = document.querySelectorAll('.rating-stars .star');
        let currentRating = 5;
        stars.forEach(s => {
            s.onclick = () => {
                currentRating = parseInt(s.dataset.value);
                stars.forEach(x => {
                    if(parseInt(x.dataset.value) <= currentRating) x.classList.add('selected');
                    else x.classList.remove('selected');
                });
            };
        });

        document.getElementById('review-form').onsubmit = async (e) => {
            e.preventDefault();
            const text = document.getElementById('review-text').value.trim();
            if(!text) return;
            try {
                await addDoc(collection(db, '/artifacts/default-app-id/public/data/productReviews'), {
                    productId, userId: currentUser.uid, rating: currentRating, text, createdAt: serverTimestamp()
                });
                document.getElementById('review-form').reset();
                alert("Review shared! Thank you.");
            } catch (e) { console.error(e); }
        };

        // Auth & Cart Sync
        onAuthStateChanged(auth, user => {
            currentUser = user;
            if (user) {
                document.getElementById('review-form-container').classList.remove('hidden');
                onSnapshot(collection(db, 'users', user.uid, 'cart'), snap => {
                    document.getElementById('cart-count-badge').textContent = snap.size;
                    const container = document.getElementById('cart-items-container');
                    let total = 0; 
                    container.innerHTML = snap.empty ? '<p class="text-center text-gray-400 mt-20 text-sm italic">Your bag is empty</p>' : '';
                    
                    snap.forEach(d => {
                        const item = d.data(); 
                        total += (parseFloat(item.price) * item.quantity);
                        container.innerHTML += `
                            <div class="flex gap-4 bg-gray-50 p-4 rounded-3xl relative group border border-transparent hover:border-pink-100 transition-all">
                                <img src="${item.imageUrl}" class="w-16 h-16 rounded-2xl object-cover bg-white shadow-sm">
                                <div class="min-w-0 flex-grow">
                                    <h4 class="text-[13px] font-bold truncate text-gray-800">${item.name}</h4>
                                    <p class="text-[10px] text-mudalali-green font-black mt-0.5">${Object.values(item.variations || {}).join(' / ')}</p>
                                    <div class="flex justify-between items-center mt-2">
                                        <p class="text-xs font-bold text-gray-500">Qty: ${item.quantity}</p>
                                        <p class="text-sm font-black text-gray-900">Rs. ${parseFloat(item.price).toLocaleString()}</p>
                                    </div>
                                </div>
                                <button onclick="removeFromCart('${d.id}')" class="absolute -top-1 -right-1 w-7 h-7 bg-white shadow-md rounded-full text-gray-300 hover:text-red-500 transition-colors flex items-center justify-center border border-gray-100">
                                    <i class="fa-solid fa-xmark text-[10px]"></i>
                                </button>
                            </div>`;
                    });
                    document.getElementById('cart-total-price').textContent = `Rs. ${total.toLocaleString()}`;
                });
            }
        });

        initProductPage();
    </script>
